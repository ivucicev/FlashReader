services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - sqlite_data:/app/data
    environment:
      - DB_PATH=/app/data/flashreader.db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8086:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
