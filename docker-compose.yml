services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - sqlite_data:/app/data
    environment:
      - DB_PATH=/app/data/flashreader.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8086:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
